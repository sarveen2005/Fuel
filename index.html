<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CounterBook POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14213D;
    --ink-light:#24345A;
    --green:#2F6E4F;
    --green-light:#3E8C66;
    --paper:#F7F3E8;
    --paper-dark:#ECE5D3;
    --amber:#E4A73B;
    --red:#C0453A;
    --text:#241F16;
    --text-dim:#6B6555;
    --line:#D8D0BA;
    --white:#FFFDF8;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0;background:transparent;}
  #app{
    font-family:'Work Sans',sans-serif;
    color:var(--text);
    background:var(--paper);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .mono{font-family:'Space Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  ::selection{background:var(--amber);color:var(--ink);}

  /* ---------- LOGIN ---------- */
  .login-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;
    background:
      repeating-linear-gradient(135deg, rgba(20,33,61,0.03) 0 2px, transparent 2px 14px),
      var(--paper);
    padding:24px;
  }
  .login-card{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:4px;
    width:100%;max-width:380px;
    padding:32px 28px 28px;
    box-shadow:0 10px 30px rgba(20,33,61,0.08);
    position:relative;
  }
  .login-card::before{
    content:"";
    position:absolute; top:-1px; left:20px; right:20px; height:8px;
    background: radial-gradient(circle at 6px 0, transparent 5px, var(--paper) 5.5px) repeat-x;
    background-size:16px 8px;
  }
  .brand{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
  .brand .mark{font-family:'Space Mono',monospace;font-weight:700;font-size:22px;color:var(--green);}
  .brand .name{font-weight:800;font-size:20px;letter-spacing:-0.02em;color:var(--ink);}
  .tagline{color:var(--text-dim);font-size:13px;margin-bottom:24px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
  .field input,.field select{
    width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:3px;
    font-size:14.5px;background:var(--white);color:var(--text);
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--green);}
  .btn{
    border:none;border-radius:3px;padding:11px 18px;font-weight:700;font-size:14px;
    letter-spacing:.02em;transition:transform .08s ease, filter .15s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--green);color:var(--white);}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-block{width:100%;}
  .btn-amber{background:var(--amber);color:var(--ink);}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
  .btn-danger{background:var(--red);color:var(--white);}
  .btn-sm{padding:6px 10px;font-size:12.5px;border-radius:3px;}
  .error-msg{color:var(--red);font-size:13px;margin:-4px 0 12px;}
  .demo-hint{margin-top:18px;padding:10px 12px;background:var(--paper);border-radius:3px;font-size:11.5px;color:var(--text-dim);border:1px dashed var(--line);}
  .demo-hint b{color:var(--text);}

  /* ---------- SHELL ---------- */
  .topbar{
    background:var(--ink);color:var(--white);
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;position:sticky;top:0;z-index:20;
  }
  .topbar .brand2{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;}
  .topbar .brand2 .mark{font-family:'Space Mono',monospace;color:var(--amber);}
  .who{display:flex;align-items:center;gap:10px;font-size:13px;}
  .who .role-badge{
    background:var(--green);color:var(--white);font-size:10px;font-weight:700;
    padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.03em;
  }
  .logout-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:var(--white);
    padding:6px 12px;border-radius:3px;font-size:12.5px;}
  .logout-btn:hover{background:rgba(255,255,255,.1);}

  .layout{display:flex;flex:1;min-height:0;}
  .sidebar{
    width:190px;flex-shrink:0;background:var(--ink-light);color:var(--white);
    padding:16px 10px;display:flex;flex-direction:column;gap:2px;
  }
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:4px;
    color:rgba(255,255,255,.75);font-size:14px;font-weight:600;background:transparent;border:none;
    text-align:left;width:100%;
  }
  .nav-item svg{width:16px;height:16px;flex-shrink:0;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:var(--white);}
  .nav-item.active{background:var(--green);color:var(--white);}
  .nav-divider{height:1px;background:rgba(255,255,255,.12);margin:10px 4px;}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);padding:8px 12px 2px;}

  .content{flex:1;min-width:0;padding:22px;overflow-y:auto;}
  .page-title{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-0.01em;margin:0 0 4px;}
  .page-sub{color:var(--text-dim);font-size:13.5px;margin:0 0 20px;}

  .card{background:var(--white);border:1px solid var(--line);border-radius:5px;padding:16px;}
  .grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start;}

  /* ---------- BILLING: items ---------- */
  .search-row{display:flex;gap:8px;margin-bottom:14px;}
  .search-row input{flex:1;padding:10px 12px;border:1.5px solid var(--line);border-radius:3px;font-size:14px;}
  .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
  .item-tile{
    border:1.5px solid var(--line);border-radius:5px;padding:12px 12px 10px;background:var(--white);
    text-align:left;position:relative;overflow:hidden;
  }
  .item-tile:disabled{opacity:.45;cursor:not-allowed;}
  .item-tile:not(:disabled):hover{border-color:var(--green);box-shadow:0 2px 8px rgba(47,110,79,.12);}
  .item-tile .nm{font-weight:700;font-size:13.5px;color:var(--ink);margin-bottom:6px;display:block;}
  .item-tile .pr{font-family:'Space Mono',monospace;font-weight:700;color:var(--green);font-size:14.5px;}
  .item-tile .st{font-size:11px;color:var(--text-dim);margin-top:4px;}
  .item-tile .st.low{color:var(--red);font-weight:700;}
  .cat-tag{position:absolute;top:8px;right:8px;font-size:9px;background:var(--paper-dark);color:var(--text-dim);
    padding:2px 6px;border-radius:8px;text-transform:uppercase;letter-spacing:.03em;}

  /* ---------- CART ---------- */
  .cart-box{position:sticky;top:8px;}
  .cart-title{font-weight:800;font-size:15px;color:var(--ink);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .cart-empty{color:var(--text-dim);font-size:13px;text-align:center;padding:26px 10px;border:1.5px dashed var(--line);border-radius:4px;}
  .cart-line{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);}
  .cart-line .nm{flex:1;font-size:13px;font-weight:600;}
  .qty-ctrl{display:flex;align-items:center;gap:6px;}
  .qty-ctrl button{width:22px;height:22px;border:1px solid var(--line);background:var(--paper);border-radius:3px;font-weight:700;font-size:13px;line-height:1;}
  .qty-ctrl span{width:20px;text-align:center;font-family:'Space Mono',monospace;font-size:13px;}
  .line-total{width:64px;text-align:right;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;}
  .rm-btn{color:var(--red);background:none;border:none;font-size:15px;padding:0 2px;}

  .sum-row{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;color:var(--text-dim);}
  .sum-row.total{font-size:17px;font-weight:800;color:var(--ink);border-top:1.5px dashed var(--line);margin-top:6px;padding-top:10px;}
  .sum-row .val{font-family:'Space Mono',monospace;font-weight:700;color:var(--text);}
  .sum-row.total .val{color:var(--green);}

  .discount-row{display:flex;gap:6px;align-items:center;margin:10px 0;}
  .discount-row select{padding:8px;border:1.5px solid var(--line);border-radius:3px;font-size:12.5px;}
  .discount-row input{width:80px;padding:8px;border:1.5px solid var(--line);border-radius:3px;font-size:13px;}

  .pay-tabs{display:flex;gap:6px;margin:12px 0 8px;}
  .pay-tab{flex:1;padding:8px 4px;border:1.5px solid var(--line);border-radius:3px;background:var(--white);
    font-size:12px;font-weight:700;color:var(--text-dim);}
  .pay-tab.active{background:var(--ink);color:var(--white);border-color:var(--ink);}

  /* ---------- TABLES ---------- */
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim);
    padding:8px 10px;border-bottom:2px solid var(--line);}
  td{padding:9px 10px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .num{font-family:'Space Mono',monospace;}
  .pill{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:9px;text-transform:uppercase;}
  .pill.cash{background:#DFF0E6;color:var(--green);}
  .pill.cheque{background:#FDF0DA;color:#8A5E12;}
  .pill.account{background:#FBE3E1;color:var(--red);}

  /* ---------- STAT CARDS ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--white);border:1px solid var(--line);border-radius:5px;padding:14px 16px;}
  .stat-card .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim);font-weight:700;}
  .stat-card .val{font-family:'Space Mono',monospace;font-size:23px;font-weight:700;color:var(--ink);margin-top:4px;}
  .stat-card.accent .val{color:var(--green);}
  .bars{display:flex;align-items:flex-end;gap:8px;height:120px;margin-top:6px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar-col .bar{width:100%;background:var(--green-light);border-radius:3px 3px 0 0;min-height:2px;}
  .bar-col .lbl{font-size:10px;color:var(--text-dim);}

  /* ---------- FORMS / ADMIN ---------- */
  .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  .form-row .field{flex:1;min-width:120px;margin-bottom:0;}
  .list-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .list-row:last-child{border-bottom:none;}
  .list-row .main{flex:1;}
  .list-row .main .t1{font-weight:700;font-size:13.5px;}
  .list-row .main .t2{font-size:12px;color:var(--text-dim);}
  .badge-role{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;text-transform:uppercase;}
  .badge-role.admin{background:var(--ink);color:var(--white);}
  .badge-role.cashier{background:var(--paper-dark);color:var(--text-dim);}

  .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .section-head h3{margin:0;font-size:15px;color:var(--ink);}

  /* ---------- MODAL / RECEIPT ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(20,33,61,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal-box{background:var(--white);border-radius:6px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;padding:20px;}
  .receipt-wrap{background:var(--white);border:1.5px dashed var(--line);padding:14px 16px 22px;font-family:'Space Mono',monospace;font-size:12px;color:#111;
    clip-path: polygon(0 0,100% 0,100% 96%,97% 100%,94% 96%,91% 100%,88% 96%,85% 100%,82% 96%,79% 100%,76% 96%,73% 100%,70% 96%,67% 100%,64% 96%,61% 100%,58% 96%,55% 100%,52% 96%,49% 100%,46% 96%,43% 100%,40% 96%,37% 100%,34% 96%,31% 100%,28% 96%,25% 100%,22% 96%,19% 100%,16% 96%,13% 100%,10% 96%,7% 100%,4% 96%,0 100%);
  }
  .receipt-wrap.w58{max-width:220px;margin:0 auto;font-size:10.5px;}
  .receipt-wrap.w80{max-width:300px;margin:0 auto;}
  .r-center{text-align:center;}
  .r-line{display:flex;justify-content:space-between;}
  .r-hr{border-top:1px dashed #999;margin:8px 0;}
  .r-shopname{font-weight:700;font-size:15px;}
  .r-item-row{display:flex;justify-content:space-between;margin-bottom:2px;}
  .r-item-name{flex:1;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .close-x{position:absolute;top:10px;right:14px;background:none;border:none;font-size:20px;color:var(--text-dim);}

  /* ---------- BOTTOM TAB (mobile) ---------- */
  .bottom-tabs{display:none;}
  .empty-note{color:var(--text-dim);font-size:13px;padding:20px;text-align:center;}
  .note-box{background:#FDF0DA;border:1px solid #E9CC93;color:#8A5E12;font-size:12px;padding:10px 12px;border-radius:4px;margin-bottom:16px;}

  @media print{
    body *{visibility:hidden;}
    #print-area, #print-area *{visibility:visible;}
    #print-area{position:absolute;top:0;left:0;width:100%;}
  }

  @media (max-width:820px){
    .grid2{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .content{padding:14px 14px 80px;}
    .layout{flex-direction:column;}
    .bottom-tabs{
      display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--ink);z-index:30;
      border-top:1px solid rgba(255,255,255,.1);
    }
    .bottom-tabs button{
      flex:1;background:none;border:none;color:rgba(255,255,255,.6);padding:10px 4px 8px;
      display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;
    }
    .bottom-tabs button.active{color:var(--amber);}
    .bottom-tabs svg{width:18px;height:18px;}
    .stat-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  var ICONS = {
    cart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>',
    box:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8L12 3 3 8l9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>',
    chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>',
    users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
    store:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l1-6h16l1 6"/><path d="M4 9v11h16V9"/><path d="M9 20v-6h6v6"/></svg>'
  };

  var STORE_KEY_ITEMS='pos:items', STORE_KEY_USERS='pos:users', STORE_KEY_BILLS='pos:bills', STORE_KEY_SHOP='pos:shop';

  // ======= CONFIG =======
  // Paste your deployed Google Apps Script Web App URL below (see AppsScript-Code.gs
  // for the script + deployment steps). Until this is set, the app runs on
  // temporary local demo data only and nothing is saved to your Sheet.
  var CONFIG = {
    SHEET_API_URL: 'PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE'
  };
  function sheetConfigured(){ return CONFIG.SHEET_API_URL && CONFIG.SHEET_API_URL.indexOf('PASTE_YOUR')===-1; }

  var state = {
    booted:false,
    storageOk:true,
    view:'login',
    loginErr:'',
    currentUser:null,
    items:[],
    users:[],
    bills:[],
    shop:{name:'CounterBook Store', address:'No.12, Galle Road, Colombo', phone:'077 123 4567', currency:'Rs.', footer:'Thank you! Come again.', width:'80'},
    cart:[],
    itemSearch:'',
    discountType:'amount',
    discountVal:0,
    payment:'cash',
    chequeNo:'',
    customerName:'',
    lastBill:null,
    showReceipt:false,
    reportRange:'today',
    adminTab:'items',
    itemForm:null,
    userForm:null
  };

  function uid(prefix){ return prefix+'_'+Math.random().toString(36).slice(2,9); }
  function money(n){ return state.shop.currency+' '+ (Math.round(n*100)/100).toFixed(2); }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function monthKey(d){ return d.slice(0,7); }

  async function storageGet(key){
    if(!sheetConfigured()) return null;
    try{
      var res = await fetch(CONFIG.SHEET_API_URL+'?action=get&key='+encodeURIComponent(key));
      var data = await res.json();
      return data.value ? JSON.parse(data.value) : null;
    }catch(e){ state.storageOk=false; return null; }
  }
  async function storageSet(key, val){
    if(!sheetConfigured()) return false;
    try{
      await fetch(CONFIG.SHEET_API_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'}, // avoids CORS preflight, Apps Script can't handle OPTIONS
        body: JSON.stringify({ key:key, value: JSON.stringify(val) })
      });
      state.storageOk = true;
      return true;
    }catch(e){ state.storageOk=false; return false; }
  }

  function seedDefaults(){
    state.items = [
      {id:uid('it'), name:'Rice 5kg', price:1450, stock:32, category:'Grocery'},
      {id:uid('it'), name:'Sugar 1kg', price:280, stock:60, category:'Grocery'},
      {id:uid('it'), name:'Milk Powder 400g', price:650, stock:18, category:'Dairy'},
      {id:uid('it'), name:'Tea 200g', price:390, stock:25, category:'Grocery'},
      {id:uid('it'), name:'Soap Bar', price:150, stock:5, category:'Household'},
      {id:uid('it'), name:'Biscuits Pack', price:220, stock:40, category:'Snacks'},
      {id:uid('it'), name:'Cooking Oil 1L', price:990, stock:14, category:'Grocery'},
      {id:uid('it'), name:'Eggs (10)', price:340, stock:22, category:'Dairy'}
    ];
    state.users = [
      {id:uid('u'), username:'admin', password:'admin123', role:'admin', name:'Shop Admin'},
      {id:uid('u'), username:'cashier', password:'cashier123', role:'cashier', name:'Counter Staff'}
    ];
    state.bills = [];
  }

  async function boot(){
    var items = await storageGet(STORE_KEY_ITEMS);
    var users = await storageGet(STORE_KEY_USERS);
    var bills = await storageGet(STORE_KEY_BILLS);
    var shop = await storageGet(STORE_KEY_SHOP);
    if(!items || !users){
      seedDefaults();
      await storageSet(STORE_KEY_ITEMS, state.items);
      await storageSet(STORE_KEY_USERS, state.users);
      await storageSet(STORE_KEY_BILLS, state.bills);
      await storageSet(STORE_KEY_SHOP, state.shop);
    } else {
      state.items = items;
      state.users = users;
      state.bills = bills || [];
      if(shop) state.shop = shop;
    }
    state.booted = true;
    render();
  }

  async function persist(key){
    if(key==='items') await storageSet(STORE_KEY_ITEMS, state.items);
    if(key==='users') await storageSet(STORE_KEY_USERS, state.users);
    if(key==='bills') await storageSet(STORE_KEY_BILLS, state.bills);
    if(key==='shop') await storageSet(STORE_KEY_SHOP, state.shop);
  }

  // ---------------- RENDER ----------------
  function render(){
    var app = document.getElementById('app');
    if(!state.booted){
      app.innerHTML = '<div class="login-wrap"><div class="empty-note">Loading CounterBook…</div></div>';
      return;
    }

  function currentTotals(){
    var subtotal = state.cart.reduce(function(s,c){ return s+c.price*c.qty; },0);
    var discount = state.discountType==='percent' ? subtotal*(state.discountVal/100) : Number(state.discountVal||0);
    discount = Math.min(discount, subtotal);
    return {subtotal:subtotal, discount:discount, total:subtotal-discount};
  }

  function bindBillingEvents(){
    var search = document.getElementById('item-search');
    if(search) search.addEventListener('input', function(e){ state.itemSearch = e.target.value; render(); });

    document.querySelectorAll('[data-add]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-add');
        var item = state.items.find(function(i){ return i.id===id; });
        if(!item || item.stock<=0) return;
        var existing = state.cart.find(function(c){ return c.id===id; });
        var inCart = existing ? existing.qty : 0;
        if(inCart>=item.stock) return;
        if(existing) existing.qty++;
        else state.cart.push({id:item.id, name:item.name, price:item.price, qty:1});
        render();
      });
    });

    document.querySelectorAll('[data-qty]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-id');
        var delta = Number(btn.getAttribute('data-qty'));
        var line = state.cart.find(function(c){ return c.id===id; });
        var item = state.items.find(function(i){ return i.id===id; });
        if(!line) return;
        var newQty = line.qty + delta;
        if(newQty<=0){ state.cart = state.cart.filter(function(c){ return c.id!==id; }); }
        else if(item && newQty>item.stock){ /* cap at stock */ }
        else { line.qty = newQty; }
        render();
      });
    });

    document.querySelectorAll('[data-remove]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-remove');
        state.cart = state.cart.filter(function(c){ return c.id!==id; });
        render();
      });
    });

    var dt = document.getElementById('disc-type');
    if(dt) dt.addEventListener('change', function(e){ state.discountType = e.target.value; render(); });
    var dv = document.getElementById('disc-val');
    if(dv) dv.addEventListener('input', function(e){ state.discountVal = e.target.value; render(); });

    document.querySelectorAll('[data-pay]').forEach(function(btn){
      btn.addEventListener('click', function(){ state.payment = btn.getAttribute('data-pay'); render(); });
    });
    var cq = document.getElementById('cheque-no');
    if(cq) cq.addEventListener('input', function(e){ state.chequeNo = e.target.value; });
    var cn = document.getElementById('cust-name');
    if(cn) cn.addEventListener('input', function(e){ state.customerName = e.target.value; });

    var complete = document.getElementById('complete-bill');
    if(complete) complete.addEventListener('click', completeBill);
  }

  async function completeBill(){
    if(state.cart.length===0) return;
    var totals = currentTotals();
    var bill = {
      id: uid('bill'),
      no: 'B'+String(state.bills.length+1).padStart(5,'0'),
      dateISO: new Date().toISOString(),
      cashier: state.currentUser.name,
      items: state.cart.map(function(c){ return {name:c.name, price:c.price, qty:c.qty}; }),
      subtotal: totals.subtotal,
      discount: totals.discount,
      total: totals.total,
      payment: state.payment,
      chequeNo: state.payment==='cheque' ? state.chequeNo : '',
      customer: state.payment==='account' ? state.customerName : ''
    };
    // decrement stock
    state.cart.forEach(function(c){
      var item = state.items.find(function(i){ return i.id===c.id; });
      if(item) item.stock = Math.max(0, item.stock - c.qty);
    });
    state.bills.push(bill);
    await persist('items');
    await persist('bills');
    state.lastBill = bill;
    state.cart = [];
    state.discountVal = 0;
    state.chequeNo = '';
    state.customerName = '';
    state.showReceipt = true;
    render();
    setTimeout(function(){ window.print(); }, 250);
  }

  // ---------------- REPORTS ----------------
  function billsInRange(range){
    var now = new Date();
    return state.bills.filter(function(b){
      var d = new Date(b.dateISO);
      if(range==='today') return b.dateISO.slice(0,10)===todayISO();
      if(range==='month') return monthKey(b.dateISO)===monthKey(now.toISOString());
      return true;
    });
  }

  function renderReports(){
    var todays = billsInRange('today');
    var monthly = billsInRange('month');
    var all = state.bills;
    var todaysTotal = todays.reduce(function(s,b){ return s+b.total; },0);
    var monthlyTotal = monthly.reduce(function(s,b){ return s+b.total; },0);
    var cashTotal = all.filter(function(b){return b.payment==='cash';}).reduce(function(s,b){return s+b.total;},0);
    var chequeTotal = all.filter(function(b){return b.payment==='cheque';}).reduce(function(s,b){return s+b.total;},0);
    var accountTotal = all.filter(function(b){return b.payment==='account';}).reduce(function(s,b){return s+b.total;},0);

    // last 7 days bar chart
    var days=[];
    for(var i=6;i>=0;i--){
      var d = new Date(); d.setDate(d.getDate()-i);
      var iso = d.toISOString().slice(0,10);
      var total = state.bills.filter(function(b){return b.dateISO.slice(0,10)===iso;}).reduce(function(s,b){return s+b.total;},0);
      days.push({label:d.toLocaleDateString(undefined,{weekday:'short'}), total: total});
    }
    var maxDay = Math.max.apply(null, days.map(function(d){return d.total;}).concat([1]));
    var barsHtml = days.map(function(d){
      var h = Math.max(3, Math.round((d.total/maxDay)*100));
      return '<div class="bar-col"><div class="bar" style="height:'+h+'px;" title="'+money(d.total)+'"></div><div class="lbl">'+d.label+'</div></div>';
    }).join('');

    var list = state.bills.slice().reverse().slice(0,25);
    var rows = list.map(function(b){
      return '<tr><td>'+b.no+'</td><td>'+new Date(b.dateISO).toLocaleString()+'</td><td>'+escapeHtml(b.cashier)+'</td>'+
        '<td><span class="pill '+b.payment+'">'+b.payment+'</span></td><td class="num">'+money(b.total)+'</td></tr>';
    }).join('');

    return ''+
    '<h1 class="page-title">Reports</h1><p class="page-sub">Daily and monthly sales overview.</p>'+
    '<div class="stat-grid">'+
      '<div class="stat-card accent"><div class="lbl">Today\'s Sales</div><div class="val">'+money(todaysTotal)+'</div></div>'+
      '<div class="stat-card accent"><div class="lbl">This Month</div><div class="val">'+money(monthlyTotal)+'</div></div>'+
      '<div class="stat-card"><div class="lbl">Cash Total</div><div class="val">'+money(cashTotal)+'</div></div>'+
      '<div class="stat-card"><div class="lbl">Cheque Total</div><div class="val">'+money(chequeTotal)+'</div></div>'+
      '<div class="stat-card"><div class="lbl">On Account</div><div class="val">'+money(accountTotal)+'</div></div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:18px;"><div class="section-head"><h3>Last 7 days</h3></div><div class="bars">'+barsHtml+'</div></div>'+
    '<div class="card"><div class="section-head"><h3>Recent Bills</h3></div>'+
    (list.length? '<table><thead><tr><th>Bill</th><th>Date</th><th>Cashier</th><th>Payment</th><th>Total</th></tr></thead><tbody>'+rows+'</tbody></table>' : '<div class="empty-note">No bills yet — complete a sale on the Billing page.</div>')+
    '</div>';
  }

          '<div class="field"><label>Username</label><input id="u-username" value="'+escapeHtml(form.username)+'"></div>'+
        '</div>'+
        '<div class="form-row">'+
          '<div class="field"><label>Password</label><input id="u-pass" value="'+escapeHtml(form.password)+'"></div>'+
          '<div class="field"><label>Role</label><select id="u-role"><option value="cashier" '+(form.role==='cashier'?'selected':'')+'>Cashier</option><option value="admin" '+(form.role==='admin'?'selected':'')+'>Admin</option></select></div>'+
        '</div>'+
        (state.userFormErr? '<div class="error-msg">'+state.userFormErr+'</div>':'')+
        '<div style="display:flex;gap:8px;"><button class="btn btn-primary" id="u-save">Save user</button><button class="btn btn-ghost" id="u-cancel">Cancel</button></div>'+
      '</div>';
    }

    return '<div class="card"><div class="section-head"><h3>Users ('+state.users.length+')</h3><button class="btn btn-amber btn-sm" id="add-user-btn">+ Add User</button></div>'+rows+'</div>'+formHtml;
  }

  function renderAdminShop(){
    var s = state.shop;
    return '<div class="card">'+
      '<div class="section-head"><h3>Shop details (appears on printed bills)</h3></div>'+
      '<div class="form-row"><div class="field"><label>Shop name</label><input id="s-name" value="'+escapeHtml(s.name)+'"></div></div>'+
      '<div class="form-row"><div class="field"><label>Address</label><input id="s-address" value="'+escapeHtml(s.address)+'"></div></div>'+
      '<div class="form-row">'+
        '<div class="field"><label>Phone</label><input id="s-phone" value="'+escapeHtml(s.phone)+'"></div>'+
        '<div class="field"><label>Currency symbol</label><input id="s-currency" value="'+escapeHtml(s.currency)+'"></div>'+
      '</div>'+
      '<div class="form-row">'+
        '<div class="field"><label>Footer note</label><input id="s-footer" value="'+escapeHtml(s.footer)+'"></div>'+
        '<div class="field"><label>Receipt width</label><select id="s-width"><option value="58" '+(s.width==='58'?'selected':'')+'>58mm</option><option value="80" '+(s.width==='80'?'selected':'')+'>80mm</option></select></div>'+
      '</div>'+
      '<button class="btn btn-primary" id="s-save">Save shop settings</button>'+
    '</div>';
  }

  function bindAdminEvents(){
    document.querySelectorAll('[data-atab]').forEach(function(btn){
      btn.addEventListener('click', function(){ state.adminTab = btn.getAttribute('data-atab'); state.itemForm=null; state.userForm=null; render(); });
    });

    // items
    var addItemBtn = document.getElementById('add-item-btn');
    if(addItemBtn) addItemBtn.addEventListener('click', function(){ state.itemForm = {id:null, name:'', category:'', price:0, stock:0}; render(); });
    document.querySelectorAll('[data-edit-item]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var it = state.items.find(function(i){ return i.id===btn.getAttribute('data-edit-item'); });
        state.itemForm = Object.assign({}, it);
        render();
      });
    });
    document.querySelectorAll('[data-del-item]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        var id = btn.getAttribute('data-del-item');
        if(!confirm('Delete this item?')) return;
        state.items = state.items.filter(function(i){ return i.id!==id; });
        await persist('items');
        render();
      });
    });
    var fSave = document.getElementById('f-save');
    if(fSave) fSave.addEventListener('click', async function(){
      var name = document.getElementById('f-name').value.trim();
      var cat = document.getElementById('f-cat').value.trim();
      var price = parseFloat(document.getElementById('f-price').value)||0;
      var stock = parseInt(document.getElementById('f-stock').value,10)||0;
      if(!name) return;
      if(state.itemForm.id){
        var it = state.items.find(function(i){ return i.id===state.itemForm.id; });
        it.name=name; it.category=cat; it.price=price; it.stock=stock;
      } else {
        state.items.push({id:uid('it'), name:name, category:cat, price:price, stock:stock});
      }
      await persist('items');
      state.itemForm = null;
      render();
    });
    var fCancel = document.getElementById('f-cancel');
    if(fCancel) fCancel.addEventListener('click', function(){ state.itemForm=null; render(); });

    // users
    var addUserBtn = document.getElementById('add-user-btn');
    if(addUserBtn) addUserBtn.addEventListener('click', function(){ state.userForm = {name:'', username:'', password:'', role:'cashier'}; state.userFormErr=''; render(); });
    document.querySelectorAll('[data-del-user]').forEach(function(btn){
      btn.addEventListener('click', async function(){
        var id = btn.getAttribute('data-del-user');
        if(!confirm('Remove this user?')) return;
        state.users = state.users.filter(function(u){ return u.id!==id; });
        await persist('users');
        render();
      });
    });
    var uSave = document.getElementById('u-save');
    if(uSave) uSave.addEventListener('click', async function(){
      var name = document.getElementById('u-name').value.trim();
      var username = document.getElementById('u-username').value.trim();
      var password = document.getElementById('u-pass').value;
      var role = document.getElementById('u-role').value;
      if(!name || !username || !password){ state.userFormErr='All fields are required.'; render(); return; }
      if(state.users.some(function(u){ return u.username.toLowerCase()===username.toLowerCase(); })){
        state.userFormErr='That username is already taken.'; render(); return;
      }
      state.users.push({id:uid('u'), name:name, username:username, password:password, role:role});
      await persist('users');
      state.userForm=null;
      render();
    });
    var uCancel = document.getElementById('u-cancel');
    if(uCancel) uCancel.addEventListener('click', function(){ state.userForm=null; render(); });

    // shop settings
    var sSave = document.getElementById('s-save');
    if(sSave) sSave.addEventListener('click', async function(){
      state.shop.name = document.getElementById('s-name').value.trim() || state.shop.name;
      state.shop.address = document.getElementById('s-address').value.trim();
      state.shop.phone = document.getElementById('s-phone').value.trim();
      state.shop.currency = document.getElementById('s-currency').value.trim() || 'Rs.';
      state.shop.footer = document.getElementById('s-footer').value.trim();
      state.shop.width = document.getElementById('s-width').value;
      await persist('shop');
      render();
    });
  }

  // ---------------- SHELL BIND ----------------
  function bindShell(){
    document.getElementById('logout-btn').addEventListener('click', function(){
      state.currentUser = null;
      state.cart = [];
      render();
    });
    document.querySelectorAll('[data-nav]').forEach(function(btn){
      btn.addEventListener('click', function(){
        state.view = btn.getAttribute('data-nav');
        state.itemForm=null; state.userForm=null;
        render();
      });
    });
    if(state.view==='billing') bindBillingEvents();
    if(state.view==='stock') bindStockEvents();
    if(state.view==='admin') bindAdminEvents();
    if(state.showReceipt) bindReceiptModal();
  }

  boot();
})();
</script>
</body>
</html>
